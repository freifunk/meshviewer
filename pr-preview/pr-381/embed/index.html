<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meshviewer Embed</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: sans-serif;
        background: #f3f5f7;
        color: #1f2933;
      }

      body {
        box-sizing: border-box;
        padding: 24px;
      }

      .embed-layout {
        box-sizing: border-box;
        height: 100%;
        display: grid;
        gap: 12px;
        grid-template-rows: auto 1fr;
      }

      .embed-note {
        margin: 0;
        padding: 12px 14px;
        background: #ffffff;
        border: 1px solid #d9e2ec;
        border-radius: 10px;
        box-shadow: 0 1px 2px rgb(15 23 42 / 0.06);
      }

      .embed-frame {
        min-height: 0;
        background: #ffffff;
        border: 1px solid #bcccdc;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgb(15 23 42 / 0.12);
        overflow: hidden;
      }

      iframe {
        border: 0;
        display: block;
        height: 100%;
        width: 100%;
      }
    </style>
    <script type="module" crossorigin src="../assets/embed-CwPMPj6T.js"></script>
    <link rel="modulepreload" crossorigin href="../assets/modulepreload-polyfill-Cf3xff8G.js">
  </head>
  <body>
    <div class="embed-layout">
      <p class="embed-note">
        Below, the map is loaded inside an iframe. The Meshviewer itself runs inside that embedded frame.
      </p>
      <div class="embed-frame">
        <iframe id="meshviewer-embedded" src="../index.html" title="Meshviewer"></iframe>
      </div>
    </div>
  </body>
</html>
